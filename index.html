<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning DAR - 7 Jours</title>
    <style>
        :root { --primary: #005f73; --bg: #f4f4f9; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--primary); }
        .container { max-width: 800px; margin: 0 auto; }
        .loader { text-align: center; font-style: italic; color: #666; margin-top: 50px; }
        .day-card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .day-title { font-size: 1.2em; font-weight: bold; color: var(--primary); border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; margin-bottom: 10px; }
        .post-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        .post-row:last-child { border-bottom: none; }
        .post-name { font-weight: bold; color: #e9af2f; } /* Couleur pour le poste */
        .doctor-name { font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Planning DAR</h1>
        <div id="app"><div class="loader">Chargement du planning en cours...</div></div>
    </div>

    <script>
        // ⚠️ REMPLACE CELA PAR L'URL DONNÉE PAR GOOGLE APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycby0_3eIqvMKy-QnWG00-ENOG2BmSJxyjLhHZrKtjLlQc-Fn_j5dDXmRfRFbsHfqPjeYqg/exec";

        async function chargerPlanning() {
            try {
                const reponse = await fetch(API_URL);
                const donnees = await reponse.json();
                
                const conteneur = document.getElementById('app');
                conteneur.innerHTML = ''; // On efface le loader

                if(donnees.erreur) {
                    conteneur.innerHTML = `<div style="color:red; text-align:center;">Erreur: ${donnees.erreur}</div>`;
                    return;
                }

                donnees.forEach(jour => {
                    let htmlCard = `<div class="day-card">
                                      <div class="day-title">${jour.dateStr}</div>`;
                    
                    if (jour.postes.length === 0) {
                        htmlCard += `<div class="post-row"><i>Aucune donnée (planning non rempli)</i></div>`;
                    } else {
                        // On trie alphabétiquement par poste pour que ce soit joli
                        jour.postes.sort((a, b) => a.poste.localeCompare(b.poste));
                        
                        jour.postes.forEach(p => {
                            htmlCard += `<div class="post-row">
                                            <span class="post-name">${p.poste}</span>
                                            <span class="doctor-name">${p.medecin}</span>
                                         </div>`;
                        });
                    }
                    htmlCard += `</div>`;
                    conteneur.innerHTML += htmlCard;
                });
            } catch (erreur) {
                document.getElementById('app').innerHTML = `<div style="color:red; text-align:center;">Erreur de connexion au planning.</div>`;
                console.error(erreur);
            }
        }

        chargerPlanning();
    </script>
</body>
</html>
